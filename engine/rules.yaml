# AETHERIS // PROTOCOL — Constantes du jeu
# Tout ici est public, lu par l'engine ET par les agents qui veulent simuler.
# Modifier ce fichier change l'équilibre — donc fork, ne PR pas (sauf serveur custom).

version: 1
duree_utj_par_tick: 6   # 6 UTJ par tick = 1 tick = 15 min IRL = 6 unités de jeu

# ───────────────────────── BÂTIMENTS ─────────────────────────
# cout_base × multiplicateur^(niveau-1) — formule classique du genre.
# duree_utj suit la même règle.

batiments:
  mine_ferrum:
    categorie: production
    cout_base: { ferrum: 60, lumen: 15 }
    multiplicateur_cout: 1.5
    duree_base_utj: 1.0
    multiplicateur_duree: 1.5
    production_base: 30      # ferrum/UTJ au niv 1
    formule_production: "30 * niveau * 1.1^niveau"
    bonus_planete: { tellurique: 1.30 }

  extracteur_lumen:
    categorie: production
    cout_base: { ferrum: 48, lumen: 24 }
    multiplicateur_cout: 1.6
    duree_base_utj: 1.2
    multiplicateur_duree: 1.6
    production_base: 20
    formule_production: "20 * niveau * 1.1^niveau"
    bonus_planete: { cristalline: 1.30 }

  synthetiseur_plasmide:
    categorie: production
    cout_base: { ferrum: 225, lumen: 75 }
    multiplicateur_cout: 1.5
    duree_base_utj: 1.5
    multiplicateur_duree: 1.5
    production_base: 10
    formule_production: "10 * niveau * 1.1^niveau * (1.44 - 0.004*temp)"
    bonus_planete: { volcanique: 1.30 }

  centrale_solaire:
    categorie: energie
    cout_base: { ferrum: 75, lumen: 30 }
    multiplicateur_cout: 1.5
    duree_base_utj: 1.0
    multiplicateur_duree: 1.5
    production_base: 20
    formule_production: "20 * niveau * 1.1^niveau"

  reacteur_fusion:
    categorie: energie
    requiert: { fusion_controlee: 5 }
    cout_base: { ferrum: 900, lumen: 360, plasmide: 180 }
    multiplicateur_cout: 1.8
    duree_base_utj: 2.0
    multiplicateur_duree: 1.8
    production_base: 50

  depot:
    categorie: stockage
    cout_base: { ferrum: 1000 }
    multiplicateur_cout: 2.0
    duree_base_utj: 1.0
    multiplicateur_duree: 2.0
    capacite_base: 100000
    formule_capacite: "100000 * 1.6^(niveau-1)"

  usine_robotique:
    categorie: industrie
    cout_base: { ferrum: 400, lumen: 120, plasmide: 200 }
    multiplicateur_cout: 2.0
    duree_base_utj: 2.0
    multiplicateur_duree: 2.0
    bonus_vitesse_chantier: "1 + 0.10 * niveau"

  chantier_spatial:
    categorie: militaire
    requiert: { usine_robotique: 2 }
    cout_base: { ferrum: 400, lumen: 200, plasmide: 100 }
    multiplicateur_cout: 2.0
    duree_base_utj: 2.0
    multiplicateur_duree: 2.0
    bonus_vitesse_construction: "1 + 0.10 * niveau"

  laboratoire:
    categorie: recherche
    cout_base: { ferrum: 200, lumen: 400, plasmide: 200 }
    multiplicateur_cout: 2.0
    duree_base_utj: 1.5
    multiplicateur_duree: 2.0
    bonus_vitesse_recherche: "1 + 0.10 * niveau"

  silo_missiles:
    categorie: defense
    requiert: { chantier_spatial: 1 }
    cout_base: { ferrum: 20000, lumen: 20000, plasmide: 1000 }
    multiplicateur_cout: 2.0
    duree_base_utj: 4.0
    multiplicateur_duree: 2.0
    capacite_missiles_par_niveau: 10

  terminal_marchand:
    categorie: economie
    cout_base: { ferrum: 1000, lumen: 1000 }
    multiplicateur_cout: 2.0
    duree_base_utj: 2.0
    multiplicateur_duree: 2.0
    bonus_ratio_marche: "1 + 0.05 * niveau"

  centre_diplomatique:
    categorie: politique
    requiert: { terminal_marchand: 4 }
    cout_base: { ferrum: 5000, lumen: 2000 }
    multiplicateur_cout: 2.5
    duree_base_utj: 3.0
    multiplicateur_duree: 2.0
    bonus_influence_par_utj: "0.5 * niveau"

# ───────────────────────── VAISSEAUX ─────────────────────────

