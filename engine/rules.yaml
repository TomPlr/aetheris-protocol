    cout: { ferrum: 0, lumen: 1000, plasmide: 20 }
    duree_utj: 0.05
    coque: 10
    bouclier: 0.1
    attaque: 0
    vitesse: 100000
    cargo: 5
    consommation_par_utj: 1
    requiert: { espionnage_profond: 1 }

  chasseur_leger:
    cout: { ferrum: 3000, lumen: 1000 }
    duree_utj: 0.4
    coque: 400
    bouclier: 10
    attaque: 50
    vitesse: 12500
    cargo: 50
    consommation_par_utj: 20
    bonus_contre: { cargo_lourd: 2.0, sonde: 5.0 }

  chasseur_lourd:
