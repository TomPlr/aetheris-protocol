    coque: 3500
    bouclier: 100
    attaque: 700
    vitesse: 12000
    cargo: 500
    consommation_par_utj: 250
    bonus_contre: { croiseur: 3.0 }
    requiert: { armement: 5 }

  cuirasse:
    cout: { ferrum: 45000, lumen: 15000 }
    duree_utj: 4.0
    coque: 6000
    bouclier: 200
    attaque: 1000
    vitesse: 9000
    cargo: 1500
    consommation_par_utj: 500
    requiert: { drive_hyperspatial: 4 }

  destroyer:
    cout: { ferrum: 60000, lumen: 50000, plasmide: 15000 }
    duree_utj: 6.0
    coque: 11000
    bouclier: 500
    attaque: 2000
    vitesse: 5000
    cargo: 2000
    consommation_par_utj: 1000
    bonus_contre: { cuirasse: 2.0 }
    requiert: { armement: 8, drive_hyperspatial: 6 }

  dreadnought:
    cout: { ferrum: 5000000, lumen: 4000000, plasmide: 1000000, singularite: 1 }
    duree_utj: 24.0
    coque: 75000
    bouclier: 5000
    attaque: 25000
    vitesse: 2500
    cargo: 10000
    consommation_par_utj: 10000
    requiert: { armement: 12, distorsion_subluminique: 2 }

  cargo_lourd:
    cout: { ferrum: 6000, lumen: 6000 }
    duree_utj: 0.5
    coque: 1200
    bouclier: 25
    attaque: 5
    vitesse: 7500
    cargo: 25000
    consommation_par_utj: 50

  recycleur:
    cout: { ferrum: 10000, lumen: 6000, plasmide: 2000 }
    duree_utj: 0.8
    coque: 1600
    bouclier: 10
    attaque: 1
    vitesse: 2000
    cargo: 20000
    consommation_par_utj: 300
    requiert: { drive_hyperspatial: 3 }

  vaisseau_colon:
    cout: { ferrum: 10000, lumen: 20000, plasmide: 10000 }
    duree_utj: 4.0
    coque: 3000
    bouclier: 100
    attaque: 0
    vitesse: 2500
    cargo: 7500
    consommation_par_utj: 1000
    requiert: { drives_impulsion: 3 }

# ───────────────────────── DÉFENSES ─────────────────────────
# Bâtiments stationnaires sur la planète. Combattent comme des vaisseaux mais
# ne peuvent pas bouger. Les boucliers planétaires sont uniques (max 1).

defenses:
  lance_missiles:
    cout: { ferrum: 2000 }
    duree_utj: 0.05
    coque: 200
    bouclier: 20
    attaque: 80
    bonus_contre: { chasseur_leger: 1.5 }

  canon_laser_leger:
    cout: { ferrum: 1500, lumen: 500 }
    duree_utj: 0.08
    coque: 200
    bouclier: 25
    attaque: 100
    requiert: { armement: 2 }

  canon_laser_lourd:
    cout: { ferrum: 6000, lumen: 2000 }
    duree_utj: 0.5
    coque: 800
    bouclier: 100
    attaque: 250
    requiert: { armement: 4 }

  canon_gauss:
    cout: { ferrum: 20000, lumen: 15000, plasmide: 2000 }
    duree_utj: 1.5
    coque: 3500
    bouclier: 200
    attaque: 1100
    bonus_contre: { croiseur: 2.0, cuirasse: 1.5 }
    requiert: { armement: 6 }

  canon_ionique:
    cout: { ferrum: 5000, lumen: 3000 }
    duree_utj: 1.0
    coque: 800
    bouclier: 500
    attaque: 150
    requiert: { bouclier_graviton: 4 }

  canon_plasma:
    cout: { ferrum: 50000, lumen: 50000, plasmide: 30000 }
    duree_utj: 4.0
    coque: 10000
    bouclier: 300
    attaque: 3000
    bonus_contre: { cuirasse: 2.0, destroyer: 1.5 }
    requiert: { armement: 8, bouclier_graviton: 6 }

  petit_bouclier_planetaire:
    cout: { ferrum: 10000, lumen: 10000 }
    duree_utj: 2.0
    coque: 2000
    bouclier: 2000
    attaque: 1
    max_par_planete: 1
    requiert: { bouclier_graviton: 2 }

  grand_bouclier_planetaire:
    cout: { ferrum: 50000, lumen: 50000 }
    duree_utj: 6.0
    coque: 10000
    bouclier: 10000
    attaque: 1
    max_par_planete: 1
    requiert: { bouclier_graviton: 6 }

# ───────────────────────── CONSTRUCTION ─────────────────────────
# La vitesse de construction = 1 + 0.10 × chantier_spatial + 0.10 × usine_robotique

construction:
  formule_vitesse: "1 + 0.10 * chantier_spatial + 0.10 * usine_robotique"

# ───────────────────────── RECHERCHES ─────────────────────────

recherches:
  robotique:                { cout_base: { ferrum: 400, lumen: 120 }, mult: 2.0, duree_base: 1.0 }
  automation_miniere:       { cout_base: { ferrum: 400, lumen: 200 }, mult: 1.8, duree_base: 1.0 }
  fusion_controlee:         { cout_base: { ferrum: 800, lumen: 400, plasmide: 200 }, mult: 1.8, duree_base: 1.2 }
  drives_impulsion:         { cout_base: { ferrum: 2000, lumen: 4000 }, mult: 2.0, duree_base: 1.5 }
  drive_hyperspatial:       { cout_base: { ferrum: 10000, lumen: 20000, plasmide: 6000 }, mult: 2.0, duree_base: 2.0, requiert: { drives_impulsion: 3 } }
  armement:                 { cout_base: { ferrum: 800, lumen: 200 }, mult: 2.0, duree_base: 1.0 }
  bouclier_graviton:        { cout_base: { ferrum: 200, lumen: 1000 }, mult: 2.0, duree_base: 1.5 }
  espionnage_profond:       { cout_base: { ferrum: 200, lumen: 1000, plasmide: 200 }, mult: 2.0, duree_base: 1.0 }
  cryptographie:            { cout_base: { ferrum: 1000, lumen: 500 }, mult: 2.0, duree_base: 1.0 }
  diplomatie:               { cout_base: { ferrum: 200, lumen: 200 }, mult: 1.5, duree_base: 0.8 }
  doctrine_imperiale:       { cout_base: { ferrum: 5000, lumen: 5000 }, mult: 2.0, duree_base: 2.0, requiert: { diplomatie: 4 } }
  distorsion_subluminique:  { cout_base: { ferrum: 200000, lumen: 400000, plasmide: 100000 }, mult: 2.5, duree_base: 4.0, requiert: { drive_hyperspatial: 6 } }

# ───────────────────────── COMBAT ─────────────────────────

combat:
  rondes_max: 6
  bouclier_regen_entre_rondes: 1.0    # 100 % entre rondes
  seuil_destruction_coque: 0.30       # ≤ 30 % de coque → 70 % de chance de destruction
  proba_destruction: 0.70
  ratio_debris: 0.30                  # 30 % du métal des épaves devient un champ
  pillage_max: 0.50                   # 50 % du non-protégé pillé

# ───────────────────────── MARCHÉ ─────────────────────────

marche:
  ratio_base: { ferrum: 3.0, lumen: 2.0, plasmide: 1.0 }
  ecart_max: 0.20

# ───────────────────────── ESPIONNAGE ─────────────────────────
# diff = nombre_sondes - tech_espionnage_defenseur × 4
# niveau d'info révélé = palier atteint :
#   diff ≥ 1   → niveau 1 (ressources)
#   diff ≥ 5   → niveau 2 (+ flotte au sol)
#   diff ≥ 25  → niveau 3 (+ défenses)
#   diff ≥ 125 → niveau 4 (+ bâtiments)
#   diff ≥ 625 → niveau 5 (+ recherches)
#
# Contre-espionnage : chaque niveau du défenseur détruit 1 sonde avec proba 0.20
# Si toutes les sondes meurent → niveau 0 et alerte au défenseur.

espionnage:
  paliers: [1, 5, 25, 125, 625]
  proba_destruction_par_niveau: 0.20

# ───────────────────────── PLANÈTES ─────────────────────────

types_planete:
  tellurique:    { bonus: { mine_ferrum: 1.30 }, champs_min: 200, champs_max: 280 }
  cristalline:   { bonus: { extracteur_lumen: 1.30 }, champs_min: 130, champs_max: 220 }
  volcanique:    { bonus: { synthetiseur_plasmide: 1.30 }, champs_min: 100, champs_max: 200 }
  glacee:        { bonus: { depot: 1.50 }, champs_min: 90, champs_max: 180 }
  gazeuse:       { bonus: { centrale_solaire: 1.40 }, champs_min: 60, champs_max: 140 }
  anomalie:      { bonus: { singularite: true }, champs_min: 50, champs_max: 100, rare: true }
