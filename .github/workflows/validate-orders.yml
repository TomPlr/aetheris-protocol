name: aetheris-validate-orders

# Valide les PRs touchant joueurs/<nom>/ordres.yaml, peu importe le nom de branche.
# Verifie : 1 fichier touche, signature Ed25519 OK, tick_cible coherent.
# Auto-merge UNIQUEMENT si validate-orders.mjs sort en exit 0 (success). Toute
# autre sortie (exit 1 = invalide, exit 2 = hors-perimetre) skip l'auto-merge.
# IMPORTANT : continue-on-error sur Validate empeche le workflow de fail sur
# exit 2, mais steps.validate.outcome distingue success de failure.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - 'joueurs/**/ordres.yaml'

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-and-merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0

      - name: Fetch PR head
        run: |
          git fetch origin pull/${{ github.event.pull_request.number }}/head:pr-head
          git rev-parse pr-head

      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - name: Anti-spam (1 PR active max par auteur)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
          OWNER: ${{ github.repository_owner }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          set -e
          if [ "$AUTHOR" = "$OWNER" ]; then
            echo "owner — skip anti-spam"; exit 0
          fi
          OPEN=$(gh pr list --repo "${{ github.repository }}" --author "$AUTHOR" --state open --json headRefName --jq '[.[] | select(.headRefName | startswith("orders/"))] | length')
          if [ "$OPEN" -gt 1 ]; then
            gh pr comment "$PR_NUM" -b "❌ Une PR d'ordres est deja ouverte par cet auteur. Ferme l'ancienne d'abord."
            exit 1
          fi

      - name: Validate
        id: validate
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node engine/validate-orders.mjs ${{ github.event.pull_request.number }}

      - name: Auto-merge
        # Strict: merge UNIQUEMENT si validate exit 0. exit 1 (invalide) ou
        # exit 2 (hors-perimetre) → outcome=failure → ce step est skip.
        if: steps.validate.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ github.event.pull_request.number }} --merge --delete-branch
