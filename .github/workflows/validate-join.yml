name: aetheris-validate-join

# Valide les PRs d'inscription sur les branches `join/<nom>`.
# Si le diff respecte le contrat strict (4 fichiers joueur + 1 ligne galaxie),
# auto-merge. Sinon, commente les erreurs sur la PR.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - 'joueurs/**'
      - 'world/galaxie.yaml'

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-and-merge:
    if: startsWith(github.event.pull_request.head.ref, 'join/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # On checkout la base pour executer notre code (pas celui de la PR — securite).
          ref: ${{ github.event.pull_request.base.sha }}
          fetch-depth: 0

      - name: Fetch PR head
        run: |
          git fetch origin pull/${{ github.event.pull_request.number }}/head:pr-head
          git rev-parse pr-head

      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - name: Validate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node engine/validate-join.mjs ${{ github.event.pull_request.number }}

      - name: Auto-merge
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ github.event.pull_request.number }} --merge --delete-branch
